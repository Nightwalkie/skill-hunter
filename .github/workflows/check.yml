name: Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.10', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r skill_hunter/requirements.txt

      - name: Smoke test — config module
        run: python -c "from skill_hunter.config import load_config; c = load_config(); assert 'github_token' in c; assert 'lookback_days' in c; print('OK')"

      - name: Smoke test — index manager
        run: python -c "from skill_hunter.index_manager import IndexManager; im = IndexManager(); idx = im.load_index(); assert isinstance(idx, dict); print('OK')"
